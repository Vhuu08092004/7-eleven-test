databases:
  - name: seven-eleven-db
    databaseName: seveneleven
    plan: free

services:
  - type: web
    name: seven-eleven-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      - key: DB_HOST
        fromDatabase:
          name: seven-eleven-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: seven-eleven-db
          property: port

      - key: DB_NAME
        fromDatabase:
          name: seven-eleven-db
          property: database

      - key: DB_USERNAME
        fromDatabase:
          name: seven-eleven-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: seven-eleven-db
          property: password