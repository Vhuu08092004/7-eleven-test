# Render Blueprint - Backend only
# PostgreSQL đã deploy sẵn, chỉ cần deploy Backend

services:
  # ========================
  # BACKEND API
  # ========================
  - type: web
    name: seven-eleven-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Database credentials từ PostgreSQL đã deploy
      - key: DB_HOST
        value: "dpg-d83djhbeo5us73b5evt0-a"
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: "seveneleven"
      - key: DB_USERNAME
        value: "seveneleven_user"
      - key: DB_PASSWORD
        value: "rC4cRPbjsin6kvFg1WrZq5kwt5RDp8pG"
      # Redis disabled
      - key: REDIS_ENABLED
        value: "false"
      - key: CACHE_TYPE
        value: simple
      # JWT Secret - THAY ĐỔI GIÁ TRỊ NÀY!
      - key: JWT_SECRET
        generateValue: true
      # CORS
      - key: CORS_ORIGINS
        value: "*"
      # Upload path
      - key: UPLOAD_PATH
        value: "/app/uploads"
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
