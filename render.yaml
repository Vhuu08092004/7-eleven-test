# Render Blueprint - Backend với PostgreSQL + Redis

services:
  # ========================
  # BACKEND API
  # ========================
  - type: web
    name: seven-eleven-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # PostgreSQL
      - key: DB_HOST
        value: "dpg-d83djhbeo5us73b5evt0-a"
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: "seveneleven"
      - key: DB_USERNAME
        value: "seveneleven_user"
      - key: DB_PASSWORD
        value: "rC4cRPbjsin6kvFg1WrZq5kwt5RDp8pG"
      # Redis
      - key: REDIS_HOST
        value: "red-d83ejaf7f7vs739254p0"
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        value: ""
      - key: REDIS_ENABLED
        value: "true"
      - key: CACHE_TYPE
        value: "redis"
      # JWT Secret
      - key: JWT_SECRET
        generateValue: true
      # CORS - Vercel frontend
      - key: CORS_ORIGINS
        value: "https://7-eleven-test.vercel.app,http://localhost:5173"
      # Upload path
      - key: UPLOAD_PATH
        value: "/app/uploads"
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
