# Render Blueprint - Backend only
# PostgreSQL đã deploy sẵn

services:
  # ========================
  # BACKEND API
  # ========================
  - type: web
    name: seven-eleven-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Database - dùng JDBC URL trực tiếp
      - key: SPRING_DATASOURCE_URL
        value: "jdbc:postgresql://dpg-d83djhbeo5us73b5evt0-a:5432/seveneleven"
      - key: SPRING_DATASOURCE_USERNAME
        value: "seveneleven_user"
      - key: SPRING_DATASOURCE_PASSWORD
        value: "rC4cRPbjsin6kvFg1WrZq5kwt5RDp8pG"
      # Redis disabled
      - key: REDIS_ENABLED
        value: "false"
      - key: CACHE_TYPE
        value: simple
      # JWT Secret
      - key: JWT_SECRET
        generateValue: true
      # CORS
      - key: CORS_ORIGINS
        value: "https://7-eleven-test.vercel.app,http://localhost:5173"
      # Upload path
      - key: UPLOAD_PATH
        value: "/app/uploads"
      # Disable Flyway tạm thời nếu cần
      # - key: SPRING_FLYWAY_ENABLED
      #   value: "false"
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
