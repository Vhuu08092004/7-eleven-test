version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: seven-eleven-postgres
    environment:
      POSTGRES_DB: seveneleven
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seven-eleven-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seven-eleven-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: seveneleven
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_ENABLED: false
      CACHE_TYPE: simple
    ports:
      - "8080:8080"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seven-eleven-frontend
    environment:
      VITE_API_URL: http://host.docker.internal:8080
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
